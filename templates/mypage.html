{% extends "base.html" %}
{% block content %}

<h2>My Page</h2>
<div class = "user-info">
  <p><strong>Username: </strong> {{ current_user.username }}</p>
  <p><strong>Nickname: </strong> {{ current_user.nickname }}</p>
  <p><strong>Email: </strong> {{ current_user.email }}</p>
</div>
<hr>

<!-- Change Nickname -->
<h3>Change Nickname</h3>
<form method="POST" action="{{ url_for('auth.mypage') }}">
  <input type="hidden" name="action" value="change_nickname">
  <input type="text" name="nickname" placeholder="New Nickname" required>
  <button type="submit">Change Nickname</button>
</form>

<h3>Change Password</h3>
<form method="POST" action="{{ url_for('auth.mypage') }}">
  <input type="hidden" name="action" value="change_password">
  <input type="password" id = "current_password" name="current_password" placeholder="Current Password" required>
  <input type="password" id = "new_password" name="new_password" placeholder="New Password" required>
  <button type="submit">Change Password</button>
  <!-- Add id for JS -->
  <label>
    <input type="checkbox" onclick="togglePasswordVisibility()"> Show Password
  </label>

  <script>
  function togglePasswordVisibility() {
    const fields = ['current_password', 'new_password'];
    fields.forEach(function(id){
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      });
  }
  </script>
</form>

<a href="{{ url_for('auth.delete_account_page') }}">Delete Account</a>

{% endblock %}
